<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Preenchimento de Formulario</title>
</head>

<body>
    
    <main>

        <div class="container">
            <div class="box">
                <div class="lado1">
                    <h1>Preencha suas informações aqui!</h1>
                    <form>
                        <div class="informacoes">
                            <input type="email" placeholder="Digite seu Email" required>    
                            <input type="password" minlength="6" maxlength="12" placeholder="Digite sua Senha" required>    
                            <input type="text" placeholder="Digite seu Nome Completo" required>    
                            <input type="date" required>    
                            <button type="submit" id="enviar-lado1">Enviar Informações</button>
                        </div>
                    </form>
                </div>
                <div class="lado2">
                    <h1>Texto sobre você:</h1>
                    <textarea id="text-sob-vc" rows="5" cols="40" id="text-sob-vc" placeholder="Escrecva seu texto aqui!" required></textarea>   
                    <button type="submit">Enviar Texto</button>
                </div>
                
            </div>

        </div>
    </main>

</body>
</html>
